<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>should dev get a chance to interview?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #E85C2E;
    --orange-deep: #C94818;
    --cream: #EDE8DC;
    --cream-soft: #E4DECE;
    --ink: #2B2420;
    --gray: #8A7F75;
    --gray-line: rgba(43, 36, 32, 0.12);
    --ink-soft: #4A3F37;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'Space Mono', 'Courier New', monospace;
    background-color: var(--cream);
    color: var(--ink);
    position: relative;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* Subtle vertical stripe + noise backdrop */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      repeating-linear-gradient(
        to right,
        rgba(43, 36, 32, 0.025) 0px,
        rgba(43, 36, 32, 0.025) 1px,
        transparent 1px,
        transparent 64px
      );
    z-index: 0;
  }

  body::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.35;
    mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='matrix' values='0 0 0 0 0.168 0 0 0 0 0.141 0 0 0 0 0.125 0 0 0 0.08 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    z-index: 0;
  }

  /* Top + bottom thin rules, editorial vibe */
  .rule {
    position: fixed;
    left: 0;
    right: 0;
    height: 1px;
    background: var(--gray-line);
    z-index: 2;
  }
  .rule.top { top: 28px; }
  .rule.bottom { bottom: 28px; }

  .meta {
    position: fixed;
    z-index: 3;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gray);
  }
  .meta.tl { top: 36px; left: 32px; }
  .meta.tr { top: 36px; right: 32px; }
  .meta.bl { bottom: 36px; left: 32px; }
  .meta.br { bottom: 36px; right: 32px; display: flex; align-items: center; gap: 10px; }

  .stage {
    position: relative;
    z-index: 1;
    height: 100%;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 80px 24px;
  }

  .card {
    max-width: 860px;
    width: 100%;
    text-align: center;
    opacity: 1;
    transform: translateY(0);
    transition: opacity 600ms ease, transform 600ms ease;
  }

  .card.leaving {
    opacity: 0;
    transform: translateY(-14px);
    pointer-events: none;
  }

  .card.hidden {
    display: none;
  }

  .card.returning {
    opacity: 0;
    transform: translateY(24px);
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 28px;
    display: inline-block;
    padding: 6px 12px;
    border: 1px solid var(--orange);
    border-radius: 999px;
  }

  h1.headline {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: clamp(2rem, 7vw, 5.25rem);
    line-height: 1.05;
    letter-spacing: 0.02em;
    color: var(--ink);
    text-transform: lowercase;
    margin-bottom: 22px;
  }

  h1.headline .accent {
    color: var(--orange);
    position: relative;
    white-space: nowrap;
  }
  h1.headline .accent::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: 4px;
    height: 6px;
    background: var(--orange);
    opacity: 0.18;
    border-radius: 2px;
  }

  .subtext {
    font-size: clamp(0.85rem, 1.4vw, 1rem);
    color: var(--gray);
    letter-spacing: 0.08em;
    margin-bottom: 56px;
    text-transform: lowercase;
  }

  .buttons {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 22px;
    flex-wrap: wrap;
  }

  button {
    font-family: inherit;
    cursor: pointer;
    border: none;
    outline: none;
  }

  .btn-yes {
    background: var(--orange);
    color: var(--cream);
    padding: 20px 42px;
    border-radius: 999px;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: lowercase;
    box-shadow: 0 8px 22px rgba(232, 92, 46, 0.25);
    transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease;
  }
  .btn-yes:hover {
    transform: translateY(-2px);
    background: var(--orange-deep);
    box-shadow: 0 14px 30px rgba(232, 92, 46, 0.32);
  }
  .btn-yes:active { transform: translateY(0); }

  .btn-no {
    position: relative;
    background: transparent;
    color: var(--ink-soft);
    padding: 14px 26px;
    border-radius: 999px;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: lowercase;
    border: 1.5px solid var(--ink-soft);
    min-width: 140px;
    transition:
      background 200ms ease,
      color 200ms ease,
      border-color 200ms ease,
      transform 200ms ease;
  }
  .btn-no:hover {
    background: rgba(74, 63, 55, 0.06);
  }
  .btn-no.nudge {
    animation: nudge 360ms ease-in-out;
  }

  @keyframes nudge {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    50% { transform: translateX(4px); }
    75% { transform: translateX(-2px); }
  }

  /* Thanks state */
  .thanks {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 80px 24px;
    text-align: center;
    opacity: 0;
    transform: translateY(24px);
    pointer-events: none;
    transition: opacity 600ms ease, transform 600ms ease;
  }
  .thanks.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
    transition: opacity 700ms ease 200ms, transform 700ms ease 200ms;
  }
  .thanks.leaving {
    opacity: 0;
    transform: translateY(-14px);
    pointer-events: none;
    transition: opacity 500ms ease, transform 500ms ease;
  }

  .thanks-inner {
    max-width: 720px;
  }

  .thanks .eyebrow {
    color: var(--orange);
    border-color: var(--orange);
  }

  .thanks h2 {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: clamp(1.6rem, 4.4vw, 3rem);
    line-height: 1.15;
    letter-spacing: 0.01em;
    text-transform: lowercase;
    margin-bottom: 26px;
  }

  .thanks .email {
    display: inline-block;
    background: var(--cream-soft);
    border: 1px dashed var(--orange);
    padding: 12px 20px;
    border-radius: 8px;
    color: var(--orange);
    font-size: clamp(0.85rem, 1.6vw, 1.05rem);
    letter-spacing: 0.04em;
    user-select: all;
  }

  .thanks .footer-note {
    margin-top: 40px;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gray);
  }

  .btn-back {
    display: inline-block;
    margin-top: 18px;
    background: transparent;
    color: var(--gray);
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 8px 14px;
    border: none;
    border-bottom: 1px solid var(--gray-line);
    border-radius: 0;
    cursor: pointer;
    transition: color 200ms ease, border-color 200ms ease, transform 200ms ease;
  }
  .btn-back:hover {
    color: var(--orange);
    border-bottom-color: var(--orange);
    transform: translateX(-2px);
  }

  /* Globe */
  .globe {
    width: 22px;
    height: 22px;
    display: inline-block;
    opacity: 0.7;
  }

  .globe-lg {
    position: fixed;
    bottom: 64px;
    right: 48px;
    width: 72px;
    height: 72px;
    opacity: 0.18;
    z-index: 1;
    animation: spin 60s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 640px) {
    .meta.tr { display: none; }
    .meta.bl { display: none; }
    .meta.tl { left: 20px; top: 28px; font-size: 10px; }
    .meta.br { right: 20px; bottom: 28px; font-size: 10px; }
    .rule.top { top: 20px; }
    .rule.bottom { bottom: 20px; }
    .buttons { gap: 14px; flex-direction: column; }
    .btn-yes { padding: 18px 36px; width: 100%; max-width: 280px; }
    .globe-lg { width: 52px; height: 52px; bottom: 60px; right: 20px; }
    .subtext { margin-bottom: 42px; }
  }
</style>
</head>
<body>

  <div class="rule top"></div>
  <div class="rule bottom"></div>

  <div class="meta tl">opportunity / 2026</div>
  <div class="meta tr">interview · 001</div>
  <div class="meta bl">status: pending</div>
  <div class="meta br">
    <svg class="globe" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <ellipse cx="12" cy="12" rx="4" ry="10"/>
      <line x1="2" y1="12" x2="22" y2="12"/>
      <path d="M4 6 Q12 10 20 6"/>
      <path d="M4 18 Q12 14 20 18"/>
    </svg>
    <span>global</span>
  </div>

  <!-- Large ambient globe -->
  <svg class="globe-lg" viewBox="0 0 100 100" fill="none" stroke="#2B2420" stroke-width="0.8" stroke-linecap="round">
    <circle cx="50" cy="50" r="46"/>
    <ellipse cx="50" cy="50" rx="18" ry="46"/>
    <ellipse cx="50" cy="50" rx="34" ry="46"/>
    <line x1="4" y1="50" x2="96" y2="50"/>
    <path d="M4 30 Q50 42 96 30"/>
    <path d="M4 70 Q50 58 96 70"/>
    <path d="M4 14 Q50 26 96 14"/>
    <path d="M4 86 Q50 74 96 86"/>
  </svg>

  <main class="stage">
    <section class="card" id="card">
      <span class="eyebrow">the question</span>
      <h1 class="headline">
        should dev get a chance<br>to <span class="accent">interview</span>?
      </h1>
      <p class="subtext">// you already know the answer.</p>
      <div class="buttons">
        <button class="btn-yes" id="btnYes">hell yeahhh →</button>
        <button class="btn-no" id="btnNo">no :(</button>
      </div>
    </section>

    <section class="thanks" id="thanks" aria-hidden="true">
      <div class="thanks-inner">
        <span class="eyebrow">confirmed</span>
        <h2>you're the best.<br>send the interview invite to</h2>
        <div class="email">devvbuilds@gmail.com</div>
        <div class="footer-note">see you in the interview</div>
        <button class="btn-back" id="btnBack" type="button">← back</button>
      </div>
    </section>
  </main>

<script>
(function () {
  const btnNo   = document.getElementById('btnNo');
  const btnYes  = document.getElementById('btnYes');
  const btnBack = document.getElementById('btnBack');
  const card    = document.getElementById('card');
  const thanks  = document.getElementById('thanks');

  // Sequence of labels cycled on each click. Stays on the last one forever.
  const noLabels = [
    'no :(',
    'no?',
    'please no',
    'are you sure?',
    'think again',
    'c\u2019mon',
    'really?',
    'stop',
    'last chance',
    '...',
    'ok fine, yes'
  ];
  let noStep = 0;

  function bumpNo() {
    noStep = Math.min(noStep + 1, noLabels.length - 1);
    btnNo.textContent = noLabels[noStep];

    // Tiny shake for feedback, restarted on each click
    btnNo.classList.remove('nudge');
    void btnNo.offsetWidth;
    btnNo.classList.add('nudge');
  }

  btnNo.addEventListener('click', function (e) {
    e.preventDefault();
    if (noStep === noLabels.length - 1) {
      btnYes.click();
      return;
    }
    bumpNo();
  });

  btnYes.addEventListener('click', function () {
    card.classList.add('leaving');
    setTimeout(function () {
      card.classList.add('hidden');
      thanks.classList.add('visible');
      thanks.setAttribute('aria-hidden', 'false');
    }, 500);
  });

  btnBack.addEventListener('click', function () {
    thanks.classList.remove('visible');
    thanks.classList.add('leaving');
    thanks.setAttribute('aria-hidden', 'true');

    setTimeout(function () {
      thanks.classList.remove('leaving');

      card.classList.remove('hidden');
      card.classList.add('returning');
      void card.offsetWidth;
      card.classList.remove('leaving');
      card.classList.remove('returning');
    }, 500);
  });
})();
</script>
</body>
</html>
